<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --accent-blue: #38bdf8;
            --accent-purple: #8b5cf6;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-end), var(--bg-start));
            height: 100vh;
            overflow: hidden;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video Containers */
        #video-grid {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            image-rendering: -webkit-optimize-contrast;
        }

        #local-video {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 240px;
            aspect-ratio: 16/9;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 10;
            background: #222;
            transform: scaleX(-1); /* Mirror effect */
            image-rendering: -webkit-optimize-contrast;
            cursor: grab;
            user-select: none;
        }

        #local-video:active {
            cursor: grabbing;
        }

        .pre-call-toggles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
            cursor: pointer;
        }

        .toggle-item input {
            width: auto;
            margin-top: 0;
            cursor: pointer;
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-top: 5px;
            text-decoration: none;
            color: var(--accent-blue);
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
            transition: 0.2s;
        }

        .file-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .file-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Setup Panel */
        #setup-panel {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .glass-card h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            margin-top: 8px;
        }

        input:focus {
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #0f172a;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
        }

        .btn-outline:hover {
            background: var(--accent-purple);
            color: white;
        }

        /* Controls Bar */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            z-index: 20;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: 0.3s;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .control-btn.active {
            background: var(--danger);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        #my-id-display {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 10px;
            word-break: break-all;
        }

        .hidden { display: none !important; }

        #status-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
            z-index: 50;
        }

        /* Chat Panel */
        #chat-panel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border-left: 1px solid var(--glass-border);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        #chat-panel.open {
            right: 0;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-blue);
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--accent-blue);
            color: #0f172a;
            border-bottom-right-radius: 2px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            color: white;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            margin-top: 0;
        }

        #send-chat-btn {
            background: var(--accent-blue);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #0f172a;
            transition: 0.3s;
        }

        #send-chat-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Badge */
        .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #1e293b;
        }
    </style>
</head>
<body>

    <div id="status-msg" class="hidden">Connecting...</div>

    <!-- Setup Panel -->
    <div id="setup-panel">
        <div class="glass-card">
            <h1>Video Call Hub</h1>
            
            <div id="init-view">
                <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem;">Initialize your session to start calling</p>
                <button class="btn btn-primary" onclick="initializePeer()">Initialize Session</button>
            </div>

            <div id="call-view" class="hidden">
                <div class="input-group">
                    <label style="font-size: 0.8rem; color: #94a3b8;">Your Room ID</label>
                    <div id="my-id-display">Generating...</div>
                </div>

                <div class="pre-call-toggles">
                    <label class="toggle-item">
                        <input type="checkbox" id="pre-mic" checked> Mic On
                    </label>
                    <label class="toggle-item">
                        <input type="checkbox" id="pre-video" checked> Video On
                    </label>
                </div>

                <div class="input-group">
                    <label style="font-size: 0.8rem; color: #94a3b8;">Join Room ID</label>
                    <input type="text" id="remote-peer-id" placeholder="Enter remote ID...">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn btn-primary" onclick="joinRoom('video')" style="margin-bottom: 0;">Video Call</button>
                    <button class="btn btn-outline" onclick="joinRoom('audio')" style="margin-bottom: 0;">Audio Only</button>
                </div>
                <button class="btn btn-outline" onclick="joinRoom('chat')" style="margin-top: 10px;">Chat Only</button>

                <p style="font-size: 0.9rem; color: #94a3b8; margin-top: 15px;">Waiting for others to join...</p>
            </div>
        </div>
    </div>

    <!-- Main View -->
    <div id="video-grid">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
    </div>

    <!-- Controls -->
    <div id="controls" class="hidden">
        <button class="control-btn" id="toggle-mic" onclick="toggleMic()" title="Mute/Unmute">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button class="control-btn" id="toggle-video" onclick="toggleVideo()" title="Camera On/Off">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </button>
        <button class="control-btn" id="toggle-screen" onclick="toggleScreenShare()" title="Share Screen">
            <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
        </button>
        <button class="control-btn" id="toggle-chat" onclick="toggleChat()" title="Chat" style="position: relative;">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span id="chat-badge" class="badge hidden">0</span>
        </button>
        <button class="control-btn active" onclick="endCall()" title="End Call">
            <svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </button>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel">
        <div class="chat-header">
            <h2>Chat</h2>
            <button class="control-btn" onclick="toggleChat()" style="width: 32px; height: 32px; background: transparent;">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="file" id="file-input" class="hidden" onchange="sendFile(this.files[0])">
            <button class="control-btn" onclick="document.getElementById('file-input').click()" style="width: 44px; height: 44px; background: rgba(255,255,255,0.05); margin-right: 0;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
            </button>
            <input type="text" id="chat-input" placeholder="Type..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button id="send-chat-btn" onclick="sendChatMessage()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let currentCall;
        let dataConnection;
        let screenStream;
        let unreadCount = 0;
        let isScreenSharing = false;
        const myIdPrefix = 'raghav-call-';
        const random4Digit = Math.floor(1000 + Math.random() * 9000).toString();
        const myFullId = myIdPrefix + random4Digit;

        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const setupPanel = document.getElementById('setup-panel');
        const controls = document.getElementById('controls');
        const statusMsg = document.getElementById('status-msg');

        // Draggable Local Video
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        localVideo.addEventListener("mousedown", dragStart);
        document.addEventListener("mousemove", drag);
        document.addEventListener("mouseup", dragEnd);

        function dragStart(e) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            if (e.target === localVideo) isDragging = true;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                setTranslate(currentX, currentY, localVideo);
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0) scaleX(-1)`;
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        async function initializePeer() {
            try {
                showStatus('Initializing PeerJS...');
                peer = new Peer(myFullId);

                peer.on('open', (id) => {
                    const shortId = id.replace(myIdPrefix, '');
                    document.getElementById('my-id-display').innerText = shortId;
                    document.getElementById('my-id-display').style.fontSize = '2rem';
                    document.getElementById('my-id-display').style.fontWeight = '800';
                    document.getElementById('my-id-display').style.color = 'var(--accent-blue)';
                    
                    document.getElementById('init-view').classList.add('hidden');
                    document.getElementById('call-view').classList.remove('hidden');
                    hideStatus();
                });

                peer.on('connection', (conn) => {
                    handleDataConnection(conn);
                });

                peer.on('call', async (call) => {
                    showStatus('Incoming call...');
                    const micOn = document.getElementById('pre-mic').checked;
                    const videoOn = document.getElementById('pre-video').checked;
                    
                    if (!localStream) {
                        await acquireMedia(true, true);
                    }
                    
                    // Apply pre-call states
                    localStream.getAudioTracks()[0].enabled = micOn;
                    localStream.getVideoTracks()[0].enabled = videoOn;
                    updateControlButtons(micOn, videoOn);

                    call.answer(localStream);
                    handleCall(call);
                });

                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    alert('Peer error: ' + err.type);
                    hideStatus();
                });

            } catch (err) {
                console.error('Initialization failed:', err);
                hideStatus();
            }
        }

        async function acquireMedia(video, audio) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: video ? {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } : false, 
                    audio: audio
                });
                localVideo.srcObject = localStream;
            } catch (err) {
                console.error('Media error:', err);
                throw err;
            }
        }

        async function joinRoom(mode) {
            let remoteId = document.getElementById('remote-peer-id').value.trim();
            if (!remoteId) return alert('Please enter a 4-Digit Room ID');
            
            if (remoteId.length === 4 && !isNaN(remoteId)) {
                remoteId = myIdPrefix + remoteId;
            }

            const micOn = document.getElementById('pre-mic').checked;
            const videoOn = document.getElementById('pre-video').checked;

            showStatus('Connecting...');

            try {
                if (mode !== 'chat') {
                    await acquireMedia(mode === 'video', true);
                    localStream.getAudioTracks()[0].enabled = micOn;
                    if (localStream.getVideoTracks()[0]) {
                        localStream.getVideoTracks()[0].enabled = videoOn;
                    }
                    updateControlButtons(micOn, videoOn);
                }

                const conn = peer.connect(remoteId);
                handleDataConnection(conn);

                if (mode !== 'chat') {
                    const call = peer.call(remoteId, localStream);
                    handleCall(call);
                } else {
                    setupPanel.classList.add('hidden');
                    controls.classList.remove('hidden');
                    document.getElementById('toggle-mic').classList.add('hidden');
                    document.getElementById('toggle-video').classList.add('hidden');
                    document.getElementById('toggle-screen').classList.add('hidden');
                    localVideo.classList.add('hidden');
                }
                hideStatus();
            } catch (err) {
                alert('Connection failed. Check permissions.');
                hideStatus();
            }
        }

        function handleCall(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
                setupPanel.classList.add('hidden');
                controls.classList.remove('hidden');
                hideStatus();
            });
            call.on('close', endCall);
        }

        function handleDataConnection(conn) {
            dataConnection = conn;
            dataConnection.on('data', (data) => {
                if (typeof data === 'object' && data.type === 'file') {
                    receiveFile(data);
                } else {
                    receiveChatMessage(data);
                }
            });
        }

        async function toggleScreenShare() {
            if (!isScreenSharing) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const screenTrack = screenStream.getVideoTracks()[0];
                    
                    if (currentCall) {
                        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                        sender.replaceTrack(screenTrack);
                    }
                    
                    localVideo.srcObject = screenStream;
                    isScreenSharing = true;
                    document.getElementById('toggle-screen').classList.add('active');

                    screenTrack.onended = stopScreenShare;
                } catch (err) {
                    console.error('Screen share error:', err);
                }
            } else {
                stopScreenShare();
            }
        }

        function stopScreenShare() {
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
            }
            if (currentCall && localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                sender.replaceTrack(videoTrack);
            }
            localVideo.srcObject = localStream;
            isScreenSharing = false;
            document.getElementById('toggle-screen').classList.remove('active');
        }

        function sendFile(file) {
            if (!file || !dataConnection) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                dataConnection.send({
                    type: 'file',
                    filename: file.name,
                    filetype: file.type,
                    data: e.target.result
                });
                appendFileMessage('sent', file.name, e.target.result, file.type);
            };
            reader.readAsArrayBuffer(file);
        }

        function receiveFile(fileData) {
            appendFileMessage('received', fileData.filename, fileData.data, fileData.filetype);
            if (!document.getElementById('chat-panel').classList.contains('open')) {
                unreadCount++;
                const badge = document.getElementById('chat-badge');
                badge.innerText = unreadCount;
                badge.classList.remove('hidden');
            }
        }

        function appendFileMessage(type, filename, data, filetype) {
            const blob = new Blob([data], { type: filetype });
            const url = URL.createObjectURL(blob);
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `
                <div style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px;">File shared</div>
                <a href="${url}" download="${filename}" class="file-link">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${filename}</span>
                </a>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !dataConnection) return;
            dataConnection.send(message);
            appendMessage('sent', message);
            input.value = '';
        }

        function receiveChatMessage(message) {
            appendMessage('received', message);
            if (!document.getElementById('chat-panel').classList.contains('open')) {
                unreadCount++;
                const badge = document.getElementById('chat-badge');
                badge.innerText = unreadCount;
                badge.classList.remove('hidden');
            }
        }

        function appendMessage(type, text) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerText = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function toggleChat() {
            const panel = document.getElementById('chat-panel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                unreadCount = 0;
                const badge = document.getElementById('chat-badge');
                badge.classList.add('hidden');
                document.getElementById('chat-input').focus();
            }
        }

        function toggleMic() {
            if (!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('toggle-mic').classList.toggle('active', !audioTrack.enabled);
        }

        function toggleVideo() {
            if (!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            videoTrack.enabled = !videoTrack.enabled;
            document.getElementById('toggle-video').classList.toggle('active', !videoTrack.enabled);
        }

        function updateControlButtons(micOn, videoOn) {
            document.getElementById('toggle-mic').classList.toggle('active', !micOn);
            document.getElementById('toggle-video').classList.toggle('active', !videoOn);
        }

        function endCall() {
            if (currentCall) currentCall.close();
            if (dataConnection) dataConnection.close();
            window.location.reload();
        }

        function showStatus(msg) {
            statusMsg.innerText = msg;
            statusMsg.classList.remove('hidden');
        }

        function hideStatus() {
            statusMsg.classList.add('hidden');
        }
    </script>
</body>
</html>
