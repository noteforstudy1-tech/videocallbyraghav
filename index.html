<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --accent-blue: #38bdf8;
            --accent-purple: #8b5cf6;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-end), var(--bg-start));
            height: 100vh;
            overflow: hidden;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video Containers */
        #video-grid {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            image-rendering: -webkit-optimize-contrast;
        }

        #local-video {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 240px;
            aspect-ratio: 16/9;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 10;
            background: #222;
            transform: scaleX(-1); /* Mirror effect */
            image-rendering: -webkit-optimize-contrast;
        }

        /* Setup Panel */
        #setup-panel {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .glass-card h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            margin-top: 8px;
        }

        input:focus {
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #0f172a;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
        }

        .btn-outline:hover {
            background: var(--accent-purple);
            color: white;
        }

        /* Controls Bar */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            z-index: 20;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: 0.3s;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .control-btn.active {
            background: var(--danger);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        #my-id-display {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 10px;
            word-break: break-all;
        }

        .hidden { display: none !important; }

        #status-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
            z-index: 50;
        }

        /* Chat Panel */
        #chat-panel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border-left: 1px solid var(--glass-border);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        #chat-panel.open {
            right: 0;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-blue);
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--accent-blue);
            color: #0f172a;
            border-bottom-right-radius: 2px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            color: white;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            margin-top: 0;
        }

        #send-chat-btn {
            background: var(--accent-blue);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #0f172a;
            transition: 0.3s;
        }

        #send-chat-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Badge */
        .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #1e293b;
        }
    </style>
</head>
<body>

    <div id="status-msg" class="hidden">Connecting...</div>

    <!-- Setup Panel -->
    <div id="setup-panel">
        <div class="glass-card">
            <h1>Video Call Hub</h1>
            
            <div id="init-view">
                <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem;">Initialize your session to start calling</p>
                <button class="btn btn-primary" onclick="initializePeer()">Initialize Session</button>
            </div>

            <div id="call-view" class="hidden">
                <div class="input-group">
                    <label style="font-size: 0.8rem; color: #94a3b8;">Your Room ID</label>
                    <div id="my-id-display">Generating...</div>
                </div>

                <div class="input-group">
                    <label style="font-size: 0.8rem; color: #94a3b8;">Join Room ID</label>
                    <input type="text" id="remote-peer-id" placeholder="Enter remote ID...">
                </div>

                <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
                <p style="font-size: 0.8rem; color: #64748b; margin: 10px 0;">- OR -</p>
                <p style="font-size: 0.9rem; color: #94a3b8;">Waiting for others to join...</p>
            </div>
        </div>
    </div>

    <!-- Main View -->
    <div id="video-grid">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
    </div>

    <!-- Controls -->
    <div id="controls" class="hidden">
        <button class="control-btn" id="toggle-mic" onclick="toggleMic()" title="Mute/Unmute">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button class="control-btn" id="toggle-video" onclick="toggleVideo()" title="Camera On/Off">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </button>
        <button class="control-btn" id="toggle-chat" onclick="toggleChat()" title="Chat" style="position: relative;">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span id="chat-badge" class="badge hidden">0</span>
        </button>
        <button class="control-btn active" onclick="endCall()" title="End Call">
            <svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </button>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel">
        <div class="chat-header">
            <h2>Chat</h2>
            <button class="control-btn" onclick="toggleChat()" style="width: 32px; height: 32px; background: transparent;">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button id="send-chat-btn" onclick="sendChatMessage()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let currentCall;
        let dataConnection;
        let unreadCount = 0;
        const myIdPrefix = 'raghav-call-';
        const random4Digit = Math.floor(1000 + Math.random() * 9000).toString();
        const myFullId = myIdPrefix + random4Digit;

        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const setupPanel = document.getElementById('setup-panel');
        const controls = document.getElementById('controls');
        const statusMsg = document.getElementById('status-msg');

        async function initializePeer() {
            try {
                showStatus('Requesting HD camera & microphone...');
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { min: 640, ideal: 1280, max: 1920 },
                        height: { min: 480, ideal: 720, max: 1080 },
                        frameRate: { ideal: 30, max: 60 }
                    }, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
                
                showStatus('Initializing PeerJS...');
                peer = new Peer(myFullId);

                peer.on('open', (id) => {
                    // Only show the 4-digit part to the user
                    const shortId = id.replace(myIdPrefix, '');
                    document.getElementById('my-id-display').innerText = shortId;
                    document.getElementById('my-id-display').style.fontSize = '2rem';
                    document.getElementById('my-id-display').style.fontWeight = '800';
                    document.getElementById('my-id-display').style.color = 'var(--accent-blue)';
                    
                    document.getElementById('init-view').classList.add('hidden');
                    document.getElementById('call-view').classList.remove('hidden');
                    hideStatus();
                });

                peer.on('connection', (conn) => {
                    handleDataConnection(conn);
                });

                peer.on('call', (call) => {
                    showStatus('Incoming call...');
                    call.answer(localStream);
                    handleCall(call);
                });

                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    alert('Peer error: ' + err.type);
                    hideStatus();
                });

            } catch (err) {
                console.error('Failed to get media:', err);
                alert('Could not access camera/microphone. Please check permissions.');
                hideStatus();
            }
        }

        function joinRoom() {
            let remoteId = document.getElementById('remote-peer-id').value.trim();
            if (!remoteId) return alert('Please enter a 4-Digit Room ID');
            
            // Auto-append prefix if only 4 digits provided
            if (remoteId.length === 4 && !isNaN(remoteId)) {
                remoteId = myIdPrefix + remoteId;
            }

            showStatus('Calling ' + remoteId.replace(myIdPrefix, '') + '...');
            
            // Connect for data channel
            const conn = peer.connect(remoteId);
            handleDataConnection(conn);

            // Connect for video call
            const call = peer.call(remoteId, localStream);
            handleCall(call);
        }

        function handleCall(call) {
            currentCall = call;
            
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
                setupPanel.classList.add('hidden');
                controls.classList.remove('hidden');
                hideStatus();
            });

            call.on('close', () => {
                endCall();
            });
        }

        function handleDataConnection(conn) {
            dataConnection = conn;
            dataConnection.on('data', (data) => {
                receiveChatMessage(data);
            });
            dataConnection.on('open', () => {
                console.log('Data connection established');
            });
            dataConnection.on('close', () => {
                console.log('Data connection closed');
            });
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !dataConnection) return;

            dataConnection.send(message);
            appendMessage('sent', message);
            input.value = '';
        }

        function receiveChatMessage(message) {
            appendMessage('received', message);
            if (!document.getElementById('chat-panel').classList.contains('open')) {
                unreadCount++;
                const badge = document.getElementById('chat-badge');
                badge.innerText = unreadCount;
                badge.classList.remove('hidden');
            }
        }

        function appendMessage(type, text) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerText = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function toggleChat() {
            const panel = document.getElementById('chat-panel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                unreadCount = 0;
                const badge = document.getElementById('chat-badge');
                badge.classList.add('hidden');
                document.getElementById('chat-input').focus();
            }
        }

        function toggleMic() {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('toggle-mic').classList.toggle('active', !audioTrack.enabled);
        }

        function toggleVideo() {
            const videoTrack = localStream.getVideoTracks()[0];
            videoTrack.enabled = !videoTrack.enabled;
            document.getElementById('toggle-video').classList.toggle('active', !videoTrack.enabled);
        }

        function endCall() {
            if (currentCall) currentCall.close();
            if (dataConnection) dataConnection.close();
            window.location.reload(); // Simplest way to reset state
        }

        function showStatus(msg) {
            statusMsg.innerText = msg;
            statusMsg.classList.remove('hidden');
        }

        function hideStatus() {
            statusMsg.classList.add('hidden');
        }
    </script>
</body>
</html>
